<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>LIS · Lisbon Airport</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="header-left">
        <div class="airport-iata">LIS</div>
        <div class="airport-info">
          <div class="airport-name">Lisbon Humberto Delgado</div>
          <div class="airport-meta">LPPT &nbsp;·&nbsp; Portugal</div>
        </div>
      </div>
      <div class="header-center">
        <div class="clock" id="clock">--:--:--</div>
        <div class="date" id="date">---</div>
      </div>
      <div class="header-right">
        <div style="display:flex;align-items:center;gap:10px;">
          <div class="status-indicator" id="status-indicator">
            <span class="status-dot" id="status-dot"></span>
            <span class="status-text" id="status-text">Connecting…</span>
          </div>
          <button class="theme-toggle" id="theme-toggle" title="Toggle light/dark mode">
            <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </button>
        </div>
        <div class="last-updated" id="last-updated">—</div>
      </div>
    </header>

    <main class="panels">
      <!-- ARRIVALS -->
      <section class="panel panel--arrivals">
        <div class="panel-header">
          <div class="panel-title">
            <svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 19V5M5 12l7 7 7-7"/>
            </svg>
            Arrivals
          </div>
          <div class="panel-count" id="arrivals-count">—</div>
        </div>
        <div class="flight-table">
          <div class="flight-table-head">
            <span>Flight</span>
            <span>From</span>
            <span></span>
            <span>Details</span>
            <span>Status</span>
          </div>
          <div class="flight-list" id="arrivals-list">
            <div class="loading-state">
              <div class="loading-spinner"></div>
              <span>Loading arrivals…</span>
            </div>
          </div>
        </div>
      </section>

      <!-- DEPARTURES -->
      <section class="panel panel--departures">
        <div class="panel-header">
          <div class="panel-title">
            <svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 5v14M5 12l7-7 7 7"/>
            </svg>
            Departures
          </div>
          <div class="panel-count" id="departures-count">—</div>
        </div>
        <div class="flight-table">
          <div class="flight-table-head">
            <span>Flight</span>
            <span>To</span>
            <span></span>
            <span>Details</span>
            <span>Status</span>
          </div>
          <div class="flight-list" id="departures-list">
            <div class="loading-state">
              <div class="loading-spinner"></div>
              <span>Loading departures…</span>
            </div>
          </div>
        </div>
      </section>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
